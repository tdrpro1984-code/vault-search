name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # package-lock.json is intentionally gitignored (Obsidian plugin
      # convention), so `npm install` not `npm ci` and no npm cache here.
      - run: npm install --no-audit --no-fund
      - run: npm test
